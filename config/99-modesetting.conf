Section "Device"
    Identifier  "Allwinner"
    Driver      "modesetting"
    Option      "AccelMethod"    "none"
    Option      "PageFlip"       "false"
    Option      "ShadowFB"       "true"
    Option      "SwapbuffersWait" "true"
EndSection

Section "Monitor"
    Identifier  "HDMI-1"
    Modeline    "1024x600_60"  48.96  1024 1064 1168 1312  600 601 604 622 -hsync +vsync
    Option      "PreferredMode" "1024x600"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "Allwinner"
    Monitor     "HDMI-1"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1024x600" "1280x720" "1920x1080"
    EndSubSection
EndSection

Section "ServerFlags"
    Option "DontZap"       "true"
    Option "BlankTime"     "0"
    Option "StandbyTime"   "0"
    Option "SuspendTime"   "0"
    Option "OffTime"       "0"
EndSection

Section "InputClass"
    Identifier   "USB Touchscreen wch.cn"
    MatchUSBID   "1a86:e5e3"
    MatchDevicePath "/dev/input/event*"
    Driver       "libinput"
    Option       "CalibrationMatrix"  "1 0 0 0 1 0 0 0 1"
    Option       "TransformationMatrix" "1 0 0 0 1 0 0 0 1"
EndSection

Section "InputClass"
    Identifier   "Touchscreen generic"
    MatchIsTouchscreen "on"
    Driver       "libinput"
    Option       "Tapping"    "on"
    Option       "NaturalScrolling" "false"
EndSection

Section "InputClass"
    Identifier   "Pointer"
    MatchIsPointer "on"
    Driver       "libinput"
EndSection
