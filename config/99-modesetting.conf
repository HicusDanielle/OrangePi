Section "Device"
    Identifier  "Allwinner"
    Driver      "modesetting"
    Option      "AccelMethod" "none"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Allwinner"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Modes "1024x600"
    EndSubSection
EndSection

Section "InputClass"
    Identifier  "USB Touchscreen wch.cn"
    MatchUSBID  "1a86:e5e3"
    MatchDevicePath "/dev/input/event*"
    Driver      "libinput"
    Option      "CalibrationMatrix" "1 0 0 0 1 0 0 0 1"
EndSection

Section "InputClass"
    Identifier  "Touchscreen generic"
    MatchIsTouchscreen "on"
    Driver      "libinput"
EndSection

Section "InputClass"
    Identifier "Pointer"
    MatchIsPointer "on"
    Driver "libinput"
EndSection
