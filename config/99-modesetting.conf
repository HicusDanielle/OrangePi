###############################################################################
# 99-modesetting.conf — Generic Xorg config for kiosk boards
# Works on: Orange Pi (Allwinner), Raspberry Pi, Odroid, Intel Stick
# Deployed to: /etc/X11/xorg.conf.d/99-modesetting.conf
###############################################################################

# ── GPU / Render device ────────────────────────────────────────────────────────
# "modesetting" is the universal DRM/KMS driver — works on all boards above.
# No Identifier needed; kernel picks the right DRM device automatically.
Section "Device"
    Identifier  "KioskGPU"
    Driver      "modesetting"
    Option      "AccelMethod"     "none"
    Option      "PageFlip"        "false"
    Option      "ShadowFB"        "true"
    Option      "SwapbuffersWait" "true"
EndSection

# ── Monitor — prefers 1024x600; falls back to display's preferred mode ─────────
Section "Monitor"
    Identifier  "KioskMonitor"
    # Custom modeline for common 7" 1024x600 panels
    Modeline    "1024x600_60"  48.96  1024 1064 1168 1312  600 601 604 622 -hsync +vsync
    Option      "PreferredMode" "1024x600"
EndSection

Section "Screen"
    Identifier  "KioskScreen"
    Device      "KioskGPU"
    Monitor     "KioskMonitor"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1024x600" "1280x720" "1920x1080"
    EndSubSection
EndSection

# ── Prevent accidental Ctrl+Alt+Backspace kill ────────────────────────────────
Section "ServerFlags"
    Option "DontZap"       "true"
    Option "BlankTime"     "0"
    Option "StandbyTime"   "0"
    Option "SuspendTime"   "0"
    Option "OffTime"       "0"
EndSection

# ── Known USB touchscreen: wch.cn (1a86:e5e3) ────────────────────────────────
Section "InputClass"
    Identifier   "USB Touchscreen wch.cn"
    MatchUSBID   "1a86:e5e3"
    MatchDevicePath "/dev/input/event*"
    Driver       "libinput"
    Option       "CalibrationMatrix"    "1 0 0 0 1 0 0 0 1"
    Option       "TransformationMatrix" "1 0 0 0 1 0 0 0 1"
EndSection

# ── Raspberry Pi official 7" DSI touchscreen ─────────────────────────────────
Section "InputClass"
    Identifier   "RPi DSI Touchscreen"
    MatchUSBID   "0eef:0001"
    MatchDevicePath "/dev/input/event*"
    Driver       "libinput"
    Option       "CalibrationMatrix" "1 0 0 0 1 0 0 0 1"
EndSection

# ── Waveshare / generic HDMI touchscreen ─────────────────────────────────────
Section "InputClass"
    Identifier   "Waveshare USB Touchscreen"
    MatchUSBID   "0eef:0005"
    MatchDevicePath "/dev/input/event*"
    Driver       "libinput"
EndSection

# ── Generic touchscreen fallback ─────────────────────────────────────────────
Section "InputClass"
    Identifier   "Generic Touchscreen"
    MatchIsTouchscreen "on"
    Driver       "libinput"
    Option       "Tapping"           "on"
    Option       "NaturalScrolling"  "false"
EndSection

# ── Pointer (mouse/trackpad) ──────────────────────────────────────────────────
Section "InputClass"
    Identifier   "Pointer"
    MatchIsPointer "on"
    Driver       "libinput"
EndSection
